name: Byblos
options:
  bundleIdPrefix: im.byblos
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "16.0"

settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "13.0"
    LIBRARY_SEARCH_PATHS: "$(inherited) $(PROJECT_DIR)/../target/release"
    HEADER_SEARCH_PATHS: "$(inherited) $(PROJECT_DIR)/../core/include"

targets:
  Byblos:
    type: application
    platform: macOS
    sources:
      - path: Byblos
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: im.byblos.app
        INFOPLIST_FILE: Byblos/Info.plist
        CODE_SIGN_ENTITLEMENTS: Byblos/Byblos.entitlements
        LD_RUNPATH_SEARCH_PATHS: "@executable_path/../Frameworks"
        SWIFT_OBJC_BRIDGING_HEADER: Byblos/Bridge/ByblosCore-Bridging-Header.h
        OTHER_LDFLAGS:
          - "-lbyblos_core"
          - "-framework CoreAudio"
          - "-framework AudioToolbox"
          - "-framework Metal"
          - "-framework Accelerate"
          - "-framework Security"
    dependencies: []

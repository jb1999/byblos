<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2D3A8C"/>
      <stop offset="100%" stop-color="#1A1F5C"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background (macOS icon shape) -->
  <rect x="16" y="16" width="480" height="480" rx="96" ry="96" fill="url(#bg)"/>

  <!-- Waveform that morphs into a Phoenician Beth (B) symbol -->
  <!-- The left side is a voice waveform; the right side resolves into -->
  <!-- a stylized angular Beth letterform, origin of the letter B -->

  <!-- Central waveform-to-letter composition -->
  <g transform="translate(256, 256)" fill="none" stroke-linecap="round" stroke-linejoin="round">

    <!-- Waveform bars (left side - voice/audio) -->
    <!-- These transition from pure waveform on the left to the Beth shape on the right -->

    <!-- Far left - small wave bars -->
    <line x1="-155" y1="-20" x2="-155" y2="20" stroke="#8B9CF7" stroke-width="14" opacity="0.5"/>
    <line x1="-120" y1="-55" x2="-120" y2="55" stroke="#8B9CF7" stroke-width="14" opacity="0.6"/>
    <line x1="-85" y1="-90" x2="-85" y2="90" stroke="#9BABFF" stroke-width="14" opacity="0.7"/>
    <line x1="-50" y1="-120" x2="-50" y2="120" stroke="#AABBFF" stroke-width="14" opacity="0.85"/>

    <!-- Center transition bar -->
    <line x1="-15" y1="-140" x2="-15" y2="140" stroke="#C5D0FF" stroke-width="16"/>

    <!-- Right side: Phoenician Beth symbol (stylized angular B) -->
    <!-- Top horizontal stroke -->
    <path d="M 20,-140 L 120,-140 L 150,-100" stroke="#E8D5B0" stroke-width="16" fill="none"/>
    <!-- Middle horizontal stroke -->
    <path d="M 20,0 L 110,0 L 135,-30" stroke="#E8D5B0" stroke-width="16" fill="none"/>
    <!-- Bottom horizontal stroke -->
    <path d="M 20,140 L 120,140 L 150,100" stroke="#E8D5B0" stroke-width="16" fill="none"/>
    <!-- Vertical spine connecting them -->
    <line x1="20" y1="-140" x2="20" y2="140" stroke="#E8D5B0" stroke-width="16"/>
    <!-- Connecting arcs (angular, Phoenician style) -->
    <line x1="150" y1="-100" x2="135" y2="-30" stroke="#E8D5B0" stroke-width="14"/>
    <line x1="135" y1="-30" x2="150" y2="100" stroke="#E8D5B0" stroke-width="14" opacity="0.0"/>
    <path d="M 110,0 L 140,40 L 150,100" stroke="#E8D5B0" stroke-width="14" fill="none"/>

  </g>
</svg>

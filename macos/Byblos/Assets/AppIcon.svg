<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Background -->
  <rect x="16" y="16" width="480" height="480" rx="96" ry="96" fill="#111127"/>

  <!-- Waveform bars — symmetric, centered -->
  <g transform="translate(256, 256)" stroke-linecap="round">
    <!-- Left bars -->
    <line x1="-120" y1="-30"  x2="-120" y2="30"  stroke="#E8B84B" stroke-width="28" opacity="0.5"/>
    <line x1="-72"  y1="-70"  x2="-72"  y2="70"  stroke="#E8B84B" stroke-width="28" opacity="0.7"/>
    <line x1="-24"  y1="-120" x2="-24"  y2="120" stroke="#E8B84B" stroke-width="28" opacity="0.9"/>
    <!-- Center bar -->
    <line x1="24"   y1="-150" x2="24"   y2="150" stroke="#E8B84B" stroke-width="28"/>
    <!-- Right bars -->
    <line x1="72"   y1="-100" x2="72"   y2="100" stroke="#E8B84B" stroke-width="28" opacity="0.8"/>
    <line x1="120"  y1="-50"  x2="120"  y2="50"  stroke="#E8B84B" stroke-width="28" opacity="0.6"/>
  </g>
</svg>
